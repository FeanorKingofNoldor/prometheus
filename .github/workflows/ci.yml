name: prometheus-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install backend quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy pytest alembic
          python -m pip install git+https://github.com/FeanorKingofNoldor/apathis.git

      - name: Compile backend
        run: python -m compileall -q prometheus

      - name: Ruff
        run: python -m ruff check prometheus/scripts/show/show_alembic_status.py prometheus/scripts/validate/validate_layer0.py prometheus/scripts/validate/validate_hedge_etf_data.py tests/test_smoke.py tests/test_show_alembic_status.py

      - name: Mypy (scoped targets from pyproject)
        run: python -m mypy --ignore-missing-imports --follow-imports skip prometheus/scripts/show/show_alembic_status.py prometheus/scripts/validate/validate_layer0.py prometheus/scripts/validate/validate_hedge_etf_data.py tests/test_smoke.py tests/test_show_alembic_status.py

      - name: Pytest
        run: python -m pytest -q tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prometheus_web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: prometheus_web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
