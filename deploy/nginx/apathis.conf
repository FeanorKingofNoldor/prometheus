server {
    listen 8444 ssl;
    server_name 88.116.16.140;

    ssl_certificate     /etc/nginx/ssl/prometheus.crt;
    ssl_certificate_key /etc/nginx/ssl/prometheus.key;

    auth_basic "Apatheon Dashboard";
    auth_basic_user_file /etc/nginx/prometheus_users;

    root /opt/apathis/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
