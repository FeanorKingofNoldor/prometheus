# Prometheus v2 - Meta policy mapping
#
# This file maps a MarketSituation label to a chosen {book_id, sleeve_id}.
# It is consumed by prometheus.meta.policy.load_meta_policies().
#
# Offline Meta training will eventually overwrite/update this artifact.

# Optional artifact metadata (parsed by prometheus.meta.policy.load_meta_policy_artifact)
version: "2026-03-24"
updated_at: "2026-03-24"
updated_by: "claude-code"

policies:
  US_EQ:
    # Lambda-driven long equity (V12/K25) is the proven alpha engine:
    #   CAGR +12-17%, Sharpe 0.9-1.0 over 29 years.
    # The allocator books (0.25 Sharpe) underperform significantly.
    #
    # Regime adaptation is handled by:
    #   1. Sector allocator OVERLAY on the V12 weights (kill/reduce sick sectors)
    #   2. Options strategies (crisis_alpha, protective puts, sector puts)
    #   3. SH.US hedge allocation sized by fragility
    #
    # The equity BOOK stays V12/K25 in all situations — the overlay and
    # options layer handle the risk reduction, not book switching.

    default:
      book_id: US_EQ_LONG_V12
      sleeve_id: US_EQ_LONG_V12_K25

    situations:
      RISK_ON:
        book_id: US_EQ_LONG_V12
        sleeve_id: US_EQ_LONG_V12_K25

      NEUTRAL:
        book_id: US_EQ_LONG_V12
        sleeve_id: US_EQ_LONG_V12_K25

      RISK_OFF:
        book_id: US_EQ_LONG_V12
        sleeve_id: US_EQ_LONG_V12_K25

      CRISIS:
        book_id: US_EQ_LONG_V12
        sleeve_id: US_EQ_LONG_V12_K25

      RECOVERY:
        book_id: US_EQ_LONG_V12
        sleeve_id: US_EQ_LONG_V12_K25
