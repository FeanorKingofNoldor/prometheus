  - series_id: IR3TIB01COM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: Colombia 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01COM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Colombia Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: CCUSMA02COM618N
    category: fx
    indicator_role: exchange_rate
    description: COP/USD Exchange Rate (monthly)
    frequency: monthly
    transform: raw
