    transform: raw

  - series_id: IRLTLT01ILM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Israel Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: CCUSMA02ILM618N
    category: fx
    indicator_role: exchange_rate
    description: ILS/USD Exchange Rate (monthly)
    frequency: monthly
