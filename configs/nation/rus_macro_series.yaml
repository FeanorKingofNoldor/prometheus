    transform: raw

  - series_id: IRLTLT01RUM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Russia Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: CCUSMA02RUM618N
