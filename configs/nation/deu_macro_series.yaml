version: 1
nation: DEU

series:
  - series_id: CLVMNACSCAB1GQDE
    category: macro_fundamentals
    indicator_role: gdp
    description: Germany Real GDP (quarterly, Eurostat)
    frequency: quarterly
    transform: yoy_pct

  - series_id: LRHUTTTTDEM156S
    category: macro_fundamentals
    indicator_role: unemployment
    description: Germany Harmonized Unemployment Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEUCPIALLMINMEI
    category: inflation
    indicator_role: cpi
    description: Germany CPI All Items (monthly)
    frequency: monthly
    transform: yoy_pct

  - series_id: IR3TIB01DEM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: Germany 3-Month Interbank Rate (monthly, EURIBOR proxy)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01DEM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Germany Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXUSEU
    category: fx
    indicator_role: exchange_rate
    description: USD/EUR Exchange Rate (daily)
    frequency: daily
    transform: raw
