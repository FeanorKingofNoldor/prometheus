  - series_id: IR3TIB01CLM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: Chile 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01CLM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Chile Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: CCUSMA02CLM618N
