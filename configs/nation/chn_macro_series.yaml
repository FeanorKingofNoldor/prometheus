version: 1
nation: CHN

series:
  - series_id: MKTGDPCNA646NWDB
    category: macro_fundamentals
    indicator_role: gdp
    description: China GDP (current USD, annual via World Bank)
    frequency: annual
    transform: yoy_pct

  - series_id: CHNCPIALLMINMEI
    category: inflation
    indicator_role: cpi
    description: China CPI All Items (monthly)
    frequency: monthly
    transform: yoy_pct

  - series_id: IR3TIB01CNM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: China 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: INTDSRCNM193N
    category: monetary_policy
    indicator_role: long_rate
    description: China Central Bank Discount Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXCHUS
    category: fx
    indicator_role: exchange_rate
    description: CNY/USD Exchange Rate (daily)
    frequency: daily
    transform: raw
