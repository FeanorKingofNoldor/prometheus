version: 1
nation: KOR

series:
  - series_id: KORGDPNQDSMEI
    category: macro_fundamentals
    indicator_role: gdp
    description: South Korea GDP (quarterly, OECD)
    frequency: quarterly
    transform: yoy_pct

  - series_id: LRHUTTTTKRM156S
    category: macro_fundamentals
    indicator_role: unemployment
    description: South Korea Harmonized Unemployment Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: KORCPIALLMINMEI
    category: inflation
    indicator_role: cpi
    description: South Korea CPI All Items (monthly)
    frequency: monthly
    transform: yoy_pct

  - series_id: IR3TIB01KRM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: South Korea 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01KRM156N
    category: monetary_policy
    indicator_role: long_rate
    description: South Korea Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXKOUS
    category: fx
    indicator_role: exchange_rate
    description: KRW/USD Exchange Rate (daily)
    frequency: daily
    transform: raw
