version: 1
nation: EST

series:
  - series_id: CLVMNACSCAB1GQEE
    category: macro_fundamentals
    indicator_role: gdp
    description: Estonia Real GDP (quarterly, Eurostat)
    frequency: quarterly
    transform: yoy_pct

  - series_id: LRHUTTTTEAM156S
    category: macro_fundamentals
    indicator_role: unemployment
    description: Estonia Harmonized Unemployment Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: ESTCPIALLMINMEI
    category: inflation
    indicator_role: cpi
    description: Estonia CPI All Items (monthly)
    frequency: monthly
    transform: yoy_pct

  - series_id: IR3TIB01EEM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: Estonia 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01EEM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Estonia Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXUSEU
    category: fx
    indicator_role: exchange_rate
    description: USD/EUR Exchange Rate (Eurozone) (daily)
    frequency: daily
    transform: raw
