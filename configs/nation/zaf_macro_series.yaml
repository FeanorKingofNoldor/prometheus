  - series_id: IR3TIB01ZAM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: South Africa 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01ZAM156N
    category: monetary_policy
    indicator_role: long_rate
    description: South Africa Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXSFUS
    category: fx
    indicator_role: exchange_rate
    description: ZAR/USD Exchange Rate (daily)
    frequency: daily
    transform: raw
