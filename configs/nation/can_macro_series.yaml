    category: macro_fundamentals
    indicator_role: gdp
    description: Canada Real GDP (quarterly, SA)
    frequency: quarterly
    transform: yoy_pct

  - series_id: LRHUTTTTCAM156S
    category: macro_fundamentals
    indicator_role: unemployment
    description: Canada Harmonized Unemployment Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: CANCPIALLMINMEI
    category: inflation
    indicator_role: cpi
    description: Canada CPI All Items (monthly)
    frequency: monthly
    transform: yoy_pct

  - series_id: IR3TIB01CAM156N
    category: monetary_policy
    indicator_role: policy_rate
    description: Canada 3-Month Interbank Rate (monthly)
    frequency: monthly
    transform: raw

  - series_id: IRLTLT01CAM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Canada Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: DEXCAUS
    category: fx
    indicator_role: exchange_rate
    description: CAD/USD Exchange Rate (daily)
    frequency: daily
    transform: raw
