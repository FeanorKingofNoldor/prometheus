  - series_id: IRLTLT01IDM156N
    category: monetary_policy
    indicator_role: long_rate
    description: Indonesia Long-Term Government Bond Yield (monthly)
    frequency: monthly
    transform: raw

  - series_id: CCUSMA02IDM618N
